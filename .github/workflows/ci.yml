name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  checks:
    name: Minimal checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run repository hygiene checks
        run: python3 scripts/ci/repo_hygiene.py

      - name: Run desktop package dry-run
        run: python3 scripts/desktop_package_dry_run.py --dry-run

      - name: Set up Python
        if: ${{ hashFiles('pyproject.toml', 'requirements*.txt', 'tests/**/*.py') != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Python checks when present
        env:
          VERIDOC_REQUIRE_PDF_EVAL_DEPS: "1"
        run: |
          if [ -f pyproject.toml ]; then
            python -m pip install --upgrade pip
            python -m pip install -e ".[dev]" || python -m pip install -e .
          elif ls requirements*.txt >/dev/null 2>&1; then
            python -m pip install --upgrade pip
            python -m pip install -r requirements.txt
            if [ -f requirements-pdf-eval.txt ]; then
              python -m pip install -r requirements-pdf-eval.txt
            fi
          else
            echo "No Python project metadata yet; skipping dependency install."
          fi

          if [ -d tests ]; then
            python -m pytest
          elif find . -name '*.py' -not -path './.git/*' -print -quit | grep -q .; then
            python -m compileall .
          else
            echo "No Python sources yet; skipping Python checks."
          fi

      - name: Set up Node
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run Node checks when present
        run: |
          if [ ! -f package.json ]; then
            echo "No Node project metadata yet; skipping Node checks."
            exit 0
          fi
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm run build --if-present
          npm test --if-present
