name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  repo-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run repository hygiene checks
        run: python3 scripts/ci/repo_hygiene.py

  python:
    name: Python checks
    runs-on: ubuntu-latest
    if: ${{ hashFiles('pyproject.toml', 'requirements*.txt') != '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          if [ -f pyproject.toml ]; then
            python -m pip install -e ".[dev]" || python -m pip install -e .
          elif ls requirements*.txt >/dev/null 2>&1; then
            python -m pip install -r requirements.txt
          fi

      - name: Run Python tests if present
        run: |
          if [ -d tests ]; then
            python -m pytest
          else
            python -m compileall .
          fi

  node:
    name: Node checks
    runs-on: ubuntu-latest
    if: ${{ hashFiles('package.json') != '' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build if available
        run: npm run build --if-present

      - name: Test if available
        run: npm test --if-present
