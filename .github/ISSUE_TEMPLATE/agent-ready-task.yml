name: Agent-ready task
description: Small VeriDoc implementation or spike task for an autonomous coding agent
title: "[Prefix-00]: "
labels:
  - agent-ready
body:
  - type: textarea
    id: background
    attributes:
      label: Background / Purpose
      description: Why this task is needed and which phase or acceptance criteria it supports.
    validations:
      required: true
  - type: input
    id: target_directories
    attributes:
      label: Target directories
      placeholder: "core/ir, core/parsers, services/api"
    validations:
      required: true
  - type: textarea
    id: implementation
    attributes:
      label: Implementation
      description: Concrete changes expected for this issue.
      value: |
        - [ ]
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Observable checks that prove the issue is complete.
      value: |
        - [ ]
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: Blocking or blocked-by issues.
      value: |
        - Blocked by:
        - Blocks:
  - type: textarea
    id: references
    attributes:
      label: Reference notes
      description: Obsidian notes or ADRs that define the intended behavior.
      value: |
        -
  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals
      description: Explicitly out-of-scope work.
      value: |
        -
